<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.3/font/bootstrap-icons.css">
    <title>Document</title>
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><i class="bi bi-list"></i></li>
                <li><i class="bi bi-card-image"></i></li>
                <li><i class="bi bi-caret-down-fill"></i></li>
                <li><p>Hoje</p></li>
            </ul>
        </nav>
    </header>

    <main>
        <section>
            <h1>EDITAR PERFIL</h1>

            <form action="">
                <div>
                    <label for="">NOME</label>
                    <input type="text">

                    <label for="porcao">UNIDADE DA PORÇÃO</label>
                    <select name="porcao" id="porcao">
                        <option value="select">Selecione uma opção</option>
                        <option value="gramas">gramas (g)</option>
                        <option value="mililitros">mililitros (ml)</option>
                    </select>

                    <label for="">QUANTIDADE DA PORÇÃO</label>
                    <input type="number">

                    <label for="">CARBOIDRATO POR PORÇÃO</label>
                    <input type="number">

                    <label for="">PROTEÍNA POR PORÇÃO</label>
                    <input type="number">

                    <label for="">GORDURA POR PORÇÃO</label>
                    <input type="number">

                    <label for="">CALORIAS (kcal) POR PORÇÃO</label>
                    <input type="number">

                    <label for="">PORÇÕES CONSUMIDAS</label>
                    <input type="number">

                    <button>SALVAR ALIMENTO</button>
                </div>
            </form>
        </section>
    </main>

    <footer>
        <ul>
            <li><a href=""><i class="bi bi-egg-fried"></i> <p>DIETA</p></i></a></li>
            <li><a href=""><i class="bi bi-lightning-charge-fill"></i> <p>TREINO</p></i></a></li>
            <li><a href=""><i class="bi bi-person-fill"></i> <p>PERFIL</p></i></a></li>
            <li><a href=""><i class="bi bi-cart"></i> <p>LOJA</p></i></a></li>
        </ul>                
    </footer>
</body>
</html>
